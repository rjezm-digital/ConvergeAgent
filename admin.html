<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

.sidebar{
width:250px;
background:linear-gradient(180deg,#6a5acd,#4a6cf7);
color:white;
padding:20px;
height:100vh;
}

.main{
flex:1;
background:#eef1f7;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

#map{
height:450px;
margin-top:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<h2>Monitoring</h2>

<div class="cards">

<div class="card">Applications <br><span id="apps">0</span></div>
<div class="card">Pending <br><span id="pending">0</span></div>
<div class="card">Installed <br><span id="installed">0</span></div>
<div class="card">For Installation <br><span id="install">0</span></div>
<div class="card">Total Commission <br><span id="total">0</span></div>
<div class="card">Weekly Commission <br><span id="weekly">0</span></div>

</div>

<h3>Agent Leaderboard</h3>

<canvas id="chart"></canvas>

<h3>Global Subscriber Map</h3>

<div id="map"></div>

</div>

<script>

let subs=JSON.parse(localStorage.getItem("subs")||"[]")

let map=L.map('map').setView([9.7,124],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let cluster=L.markerClusterGroup()

let agents={}

subs.forEach(s=>{

if(!agents[s.agent]) agents[s.agent]=0

if(s.status==5) agents[s.agent]++

if(s.lat && s.lng){

cluster.addLayer(
L.marker([s.lat,s.lng]).bindPopup(s.name)
)

}

})

map.addLayer(cluster)

new Chart(document.getElementById("chart"),{

type:'bar',
data:{
labels:Object.keys(agents),
datasets:[{
label:'Installs',
data:Object.values(agents)
}]
}

})

function logout(){
window.location="index.html"
}

</script>

</body>
</html>
