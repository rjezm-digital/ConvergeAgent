<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Converge CRM V5</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.sidebar{
width:220px;
background:#020617;
border-right:1px solid #1e293b;
}

.sidebar button{
width:100%;
padding:10px;
border-radius:8px;
text-align:left;
}

.sidebar button:hover{
background:#1e293b;
}

.card{
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
padding:18px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#map{
height:320px;
border-radius:8px;
}

</style>

</head>

<body class="flex h-screen">

<!-- SIDEBAR -->

<div class="sidebar p-4">

<h2 class="text-lg font-bold mb-6">
CRM V5
</h2>

<button onclick="scrollToSection('checker')">Fiber Checker</button>
<button onclick="scrollToSection('mapSection')">Map</button>
<button onclick="scrollToSection('applications')">Applications</button>

</div>


<!-- MAIN -->

<div class="flex-1 flex flex-col">

<div class="flex justify-between items-center px-6 py-4 bg-slate-900 border-b border-slate-800">

<h1 class="text-xl font-semibold">
Converge Sales Dashboard
</h1>

<button id="btnAdd" class="bg-blue-600 px-4 py-2 rounded">
New Application
</button>

</div>


<div class="p-6 space-y-6 overflow-auto">

<!-- FIBER CHECKER -->

<div id="checker" class="card">

<h2 class="text-lg mb-3">
Fiber Availability Checker
</h2>

<input
id="checkAddress"
placeholder="Enter Address"
class="w-full p-3 rounded bg-slate-900 mb-3"
/>

<button onclick="checkFiber()" class="bg-blue-600 px-4 py-2 rounded">
Check Availability
</button>

<div id="fiberResult" class="mt-4"></div>

</div>

<!-- MAP -->

<div id="mapSection" class="card">

<h2 class="mb-3">Location Map</h2>

<div id="map"></div>

</div>

<!-- SALES CHART -->

<div class="card">

<canvas id="salesChart"></canvas>

</div>

<!-- APPLICATION TABLE -->

<div id="applications" class="card">

<h2 class="mb-3">Applications</h2>

<table class="w-full text-sm">

<thead>

<tr>
<th>Code</th>
<th>Name</th>
<th>Phone</th>
<th>Plan</th>
<th>Status</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

</div>


<!-- MODAL -->

<div id="modal" class="modal hidden">

<div class="card w-full max-w-md">

<h2 class="mb-3">New Application</h2>

<form id="form" class="space-y-3">

<input id="code" placeholder="Code" class="w-full p-3 bg-slate-900 rounded">

<input id="name" placeholder="Customer Name" class="w-full p-3 bg-slate-900 rounded">

<input id="phone" placeholder="Phone" class="w-full p-3 bg-slate-900 rounded">

<input id="address" placeholder="Address" class="w-full p-3 bg-slate-900 rounded">

<select id="plan" class="w-full p-3 bg-slate-900 rounded">

<option>Surf2Sawa 25 Mbps — ₱700</option>

<option>Super FiberX 1349 — 200 Mbps — ₱1349</option>
<option>Super FiberX 1599 — 400 Mbps — ₱1599</option>
<option>Super FiberX 2599 — 800 Mbps — ₱2599</option>

<option>FiberX 1500 — 300 Mbps — ₱1500</option>
<option>FiberX 2000 — 500 Mbps — ₱2000</option>
<option>FiberX 2500 — 700 Mbps — ₱2500</option>
<option>FiberX 3500 — 1 Gbps — ₱3500</option>

<option>GameChanger EZ — 400 Mbps — ₱1800</option>
<option>GameChanger Pro — 700 Mbps — ₱2500</option>

<option>FiberX Time-of-Day 1699</option>
<option>FiberX Time-of-Day 3000</option>

<option>FiberXtreme 4500</option>
<option>FiberXtreme 7000</option>

<option>MicroBiz 1500</option>
<option>MicroBiz 2500</option>
<option>MicroBiz 3500</option>

<option>FlexiBiz 3000</option>
<option>FlexiBiz 5000</option>
<option>FlexiBiz 7000</option>

</select>

<select id="status" class="w-full p-3 bg-slate-900 rounded">

<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>

<button class="bg-blue-600 w-full p-3 rounded">
Save
</button>

<button type="button" onclick="closeModal()" class="bg-slate-700 w-full p-3 rounded">
Cancel
</button>

</form>

</div>

</div>


<script>

const $=id=>document.getElementById(id)

let records=JSON.parse(localStorage.getItem("crm"))||[]

let map
let marker
let chart

const napLocations=[

{name:"Tagbilaran NAP",lat:9.65,lng:123.85},
{name:"Tubigon NAP",lat:9.95,lng:123.96},
{name:"Panglao NAP",lat:9.58,lng:123.74}

]

function initMap(){

map=L.map('map').setView([9.65,123.85],11)

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

function distance(lat1,lon1,lat2,lon2){

const R=6371
const dLat=(lat2-lat1)*Math.PI/180
const dLon=(lon2-lon1)*Math.PI/180

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c*1000

}

async function checkFiber(){

let addr=$("checkAddress").value.trim()

if(!addr){
alert("Enter address")
return
}

let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(addr)

let res=await fetch(url)
let data=await res.json()

if(!data.length){
alert("Address not found")
return
}

let lat=parseFloat(data[0].lat)
let lon=parseFloat(data[0].lon)

if(marker) map.removeLayer(marker)

marker=L.marker([lat,lon]).addTo(map)

map.setView([lat,lon],15)

let nearest=null
let min=999999

napLocations.forEach(n=>{

let d=distance(lat,lon,n.lat,n.lng)

if(d<min){
min=d
nearest=n
}

})

let status="Not Available"

if(min<300) status="Fiber Available"
else if(min<700) status="Possible Extension"

$("fiberResult").innerHTML=`

<b>${status}</b><br>
Nearest Node: ${nearest.name}<br>
Distance: ${Math.round(min)} meters

`

}

function renderTable(){

$("table").innerHTML=""

records.forEach(r=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.code}</td>
<td>${r.name}</td>
<td>${r.phone}</td>
<td>${r.plan}</td>
<td>${r.status}</td>
`

$("table").appendChild(tr)

})

}

function openModal(){
$("modal").classList.remove("hidden")
}

function closeModal(){
$("modal").classList.add("hidden")
}

$("btnAdd").onclick=openModal

$("form").onsubmit=e=>{

e.preventDefault()

records.push({

code:$("code").value,
name:$("name").value,
phone:$("phone").value,
address:$("address").value,
plan:$("plan").value,
status:$("status").value

})

localStorage.setItem("crm",JSON.stringify(records))

closeModal()

renderTable()

}

renderTable()

window.onload=initMap

</script>

</body>
</html>
