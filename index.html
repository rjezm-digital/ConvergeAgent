<!DOCTYPE html>
<html>
<head>

<title>FiberAgent CRM</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a5acd,#4a6cf7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#4a6cf7;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="login">

<h2>FiberAgent CRM</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const users={
agent1:{pass:"1234",role:"agent"},
agent2:{pass:"1234",role:"agent"},
admin:{pass:"admin123",role:"admin"}
}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].pass===p){

if(users[u].role==="agent"){

localStorage.setItem("agent",u)
window.location="agent.html"

}

if(users[u].role==="admin"){

window.location="admin.html"

}

}else{

alert("Invalid login")

}

}

</script>

</body>
</html>
