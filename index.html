<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Converge Agent CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#0f172a;
color:#f1f5f9;
}

.font-display{
font-family:'Fraunces',serif;
}

.card{
background:#1e293b;
border:1px solid #334155;
border-radius:12px;
padding:14px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

</style>

</head>


<body class="flex flex-col min-h-screen">


<header class="flex items-center justify-between px-4 py-3 bg-slate-800 border-b border-slate-700">

<div class="flex items-center gap-3">

<img src="https://seeklogo.com/images/C/converge-ict-logo-7F4C8A2C1B-seeklogo.com.png" class="h-8">

<div>
<h1 class="font-display text-lg">Agent CRM</h1>
<p class="text-xs text-slate-400">Converge Sales</p>
</div>

</div>

</header>



<main class="p-4 flex-1">


<div id="stats" class="grid grid-cols-2 gap-3 mb-4"></div>



<div class="flex gap-2 mb-4">

<input id="search"
placeholder="Search customer"
class="flex-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded">

</div>



<div id="planStats" class="card mb-4 text-xs"></div>



<div id="list" class="space-y-3"></div>

</main>



<!-- ACTION BAR -->

<div class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 p-3 flex justify-around">

<button id="btn-add">
<i data-lucide="plus"></i>
</button>

<button id="btn-calendar">
<i data-lucide="calendar"></i>
</button>

<button id="btn-export">
<i data-lucide="download"></i>
</button>

<label>
<i data-lucide="upload"></i>
<input type="file" id="importFile" hidden>
</label>

</div>



<footer class="text-center text-xs text-slate-400 py-3 mt-12">

© 2026 Converge Agent CRM  
By Randy Tadlas

</footer>



<!-- MODAL -->

<div id="modal" class="modal hidden">

<div class="card w-full max-w-lg">

<h2 class="font-display mb-3">New Application</h2>

<form id="form" class="space-y-2">

<input id="code" placeholder="Code"
class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded">

<input id="name" placeholder="Customer Name"
class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded">

<input id="phone" placeholder="Phone"
class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded">


<select id="plan"
class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded">

<option>Surf2Sawa 25 Mbps — ₱700</option>

<option>Super FiberX 1349 — 200 Mbps — ₱1349</option>
<option>Super FiberX 1599 — 400 Mbps — ₱1599</option>
<option>Super FiberX 2599 — 800 Mbps — ₱2599</option>

<option>FiberX 1500 — 300 Mbps — ₱1500</option>
<option>FiberX 2000 — 500 Mbps — ₱2000</option>
<option>FiberX 2500 — 700 Mbps — ₱2500</option>
<option>FiberX 3500 — 1 Gbps — ₱3500</option>

<option>GameChanger EZ 1800 — 400 Mbps — ₱1800</option>
<option>GameChanger Pro 2500 — 700 Mbps — ₱2500</option>

<option>FiberX Time-of-Day 1699 — 400 Mbps Day / 600 Mbps Night — ₱1699</option>
<option>FiberX Time-of-Day 3000 — 800 Mbps Day / 1 Gbps Night — ₱3000</option>

<option>FiberXtreme 4500 — 400 Mbps — ₱4500</option>
<option>FiberXtreme 7000 — 800 Mbps — ₱7000</option>

</select>


<div id="planInfo" class="text-xs text-slate-400"></div>


<select id="status"
class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded">

<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>


<input type="date" id="install"
class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded">

<input type="date" id="follow"
class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded">


<div class="flex gap-2 pt-2">

<button class="flex-1 py-2 bg-blue-500 rounded">
Save
</button>

<button type="button" id="cancel"
class="flex-1 py-2 bg-slate-700 rounded">
Cancel
</button>

</div>

</form>

</div>

</div>



<script>

const $ = id => document.getElementById(id)

let records = JSON.parse(localStorage.getItem("crm")) || []

function save(){
localStorage.setItem("crm",JSON.stringify(records))
}



function getPrice(plan){

return parseInt(plan.match(/₱(\d+)/)[1])

}



function commission(plan){

let price = getPrice(plan)

if(price<=1500) return 800
if(price<=2500) return 1200
return 2000

}



function renderStats(){

let installed = records.filter(r=>r.status==="Installed").length

let comm = records.reduce((t,r)=>t+commission(r.plan),0)

$("stats").innerHTML=`

<div class="card">
<p class="text-xs text-slate-400">TOTAL</p>
<p class="text-xl font-bold">${records.length}</p>
</div>

<div class="card">
<p class="text-xs text-slate-400">INSTALLED</p>
<p class="text-xl font-bold">${installed}</p>
</div>

<div class="card">
<p class="text-xs text-slate-400">COMMISSION</p>
<p class="text-xl font-bold text-green-400">₱${comm}</p>
</div>

`

}



function renderPlanStats(){

let stats={}

records.forEach(r=>{
stats[r.plan]=(stats[r.plan]||0)+1
})

let html="<b>Plan Sales</b><br>"

Object.entries(stats).forEach(([p,c])=>{
html+=`${p} : ${c}<br>`
})

$("planStats").innerHTML=html

}



function renderList(){

let search=$("search").value.toLowerCase()

$("list").innerHTML=""

records.filter(r=>r.name.toLowerCase().includes(search))
.forEach((r,i)=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<div class="flex justify-between">
<b>${r.name}</b>
<span class="text-xs">${r.status}</span>
</div>

<p class="text-xs text-slate-400">${r.plan}</p>

<div class="flex justify-between mt-2 text-xs">

<span>Commission ₱${commission(r.plan)}</span>

<div class="flex gap-2">

<button onclick="advance(${i})">
<i data-lucide="arrow-right"></i>
</button>

<button onclick="delRec(${i})">
<i data-lucide="trash"></i>
</button>

</div>

</div>

`

$("list").appendChild(div)

})

lucide.createIcons()

}



function advance(i){

const order=["Application","OMD","Approved","Scheduled","Installed"]

let idx=order.indexOf(records[i].status)

if(idx<order.length-1)
records[i].status=order[idx+1]

save()

renderStats()
renderList()
renderPlanStats()

}



function delRec(i){

records.splice(i,1)

save()

renderStats()
renderList()
renderPlanStats()

}



$("btn-add").onclick=()=>{

$("modal").classList.remove("hidden")

}



$("cancel").onclick=()=>{

$("modal").classList.add("hidden")

}



$("form").onsubmit=e=>{

e.preventDefault()

records.push({

code:$("code").value,
name:$("name").value,
phone:$("phone").value,
plan:$("plan").value,
status:$("status").value,
install:$("install").value,
follow:$("follow").value

})

save()

$("modal").classList.add("hidden")

renderStats()
renderList()
renderPlanStats()

}



$("btn-export").onclick=()=>{

let blob=new Blob([JSON.stringify(records)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="convergeCRM.json"

a.click()

}



$("importFile").onchange=e=>{

let reader=new FileReader()

reader.onload=function(){

records=JSON.parse(reader.result)

save()

renderStats()
renderList()
renderPlanStats()

}

reader.readAsText(e.target.files[0])

}



$("btn-calendar").onclick=()=>{

let installs=records.filter(r=>r.install)

let txt="Install Schedule\n\n"

installs.forEach(r=>{
txt+=`${r.install} - ${r.name}\n`
})

alert(txt)

}



$("plan").onchange=function(){

let plan=this.value

let price=getPrice(plan)

$("planInfo").innerText=`Price: ₱${price} | Commission: ₱${commission(plan)}`

}



$("search").oninput=renderList



renderStats()
renderList()
renderPlanStats()

lucide.createIcons()

</script>

</body>
</html>
