<!DOCTYPE html>
<html>
<head>

<title>FiberAgent CRM</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a5acd,#4a6cf7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login{
background:white;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#4a6cf7;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login">

<h2>FiberAgent CRM</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

let users={
agent1:"1234",
agent2:"1234",
agent3:"1234",
admin:"admin123"
}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u]===p){

if(u==="admin"){
window.location="admin.html"
}else{
localStorage.setItem("agent",u)
window.location="agent.html"
}

}else{
alert("Invalid login")
}

}

</script>

</body>
</html>
