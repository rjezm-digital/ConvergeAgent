<!DOCTYPE html>
<html>
<head>
<title>Converge Sales Agent CRM</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f6fa;
}

/* LOGIN */

.login{
width:320px;
margin:120px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.login input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:10px;
background:#4a6cf7;
color:white;
border:none;
border-radius:6px;
width:100%;
cursor:pointer;
}

/* DASHBOARD */

.dashboard{
display:none;
}

.sidebar{
width:220px;
background:white;
position:fixed;
height:100%;
padding:20px;
box-shadow:2px 0 10px rgba(0,0,0,0.05);
}

.sidebar h2{
color:#4a6cf7;
}

.sidebar a{
display:block;
padding:10px;
margin:6px 0;
text-decoration:none;
color:#333;
}

.main{
margin-left:240px;
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
color:white;
padding:20px;
border-radius:10px;
font-size:18px;
}

.c1{background:linear-gradient(45deg,#6a11cb,#2575fc);}
.c2{background:linear-gradient(45deg,#ff758c,#ff7eb3);}
.c3{background:linear-gradient(45deg,#42e695,#3bb2b8);}
.c4{background:linear-gradient(45deg,#ff9966,#ff5e62);}

.formbox{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

.status{
padding:5px 10px;
border-radius:20px;
color:white;
font-size:12px;
}

.applied{background:#ff9800;}
.verify{background:#2196f3;}
.install{background:#673ab7;}
.done{background:#4caf50;}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login" id="login">

<h2>Agent Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<div class="sidebar">

<h2>Converge</h2>
<a>Dashboard</a>
<a>Subscribers</a>
<a>Installations</a>
<a>Reports</a>

</div>

<div class="main">

<h2>Subscriber Application Monitoring</h2>

<div class="cards">

<div class="card c1">
Applications<br>
<span id="total">0</span>
</div>

<div class="card c2">
Pending Install<br>
<span id="pending">0</span>
</div>

<div class="card c3">
Installed<br>
<span id="installed">0</span>
</div>

<div class="card c4">
Commission<br>
₱ <span id="commission">0</span>
</div>

</div>

<div class="formbox">

<h3>Add Subscriber</h3>

<input id="name" placeholder="Subscriber Name">
<input id="phone" placeholder="Phone Number">
<input id="code" placeholder="Application Code">
<input id="address" placeholder="Address">

<select id="plan">

<option value="1349">Super FiberX Play 1349</option>
<option value="1599">Super FiberX Max 1599</option>
<option value="2599">Super FiberX Ultra 2599</option>

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>
<option value="7499">FiberX 7499</option>

<option value="1699">FiberX Time of Day 1699</option>
<option value="3000">FiberX Time of Day 3000</option>

<option value="2500">GameChanger Pro Entry 2500</option>
<option value="3000">GameChanger Pro Mid 3000</option>
<option value="3500">GameChanger 3500</option>
<option value="5000">GameChanger 5000</option>

<option value="1500">FlexiBIZ 1500</option>
<option value="2000">FlexiBIZ 2000</option>
<option value="3000">FlexiBIZ 3000</option>
<option value="5000">FlexiBIZ 5000</option>

<option value="1449">MicroBIZ MAX 1449</option>
<option value="1549">MicroBIZ MAX 1549</option>
<option value="1749">MicroBIZ MAX 1749</option>
<option value="2099">MicroBIZ MAX 2099</option>
<option value="2449">MicroBIZ MAX 2449</option>

</select>

<select id="status">
<option>Applied</option>
<option>Verification</option>
<option>For Installation</option>
<option>Installed</option>
</select>

<button onclick="add()">Add Subscriber</button>

</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Application Code</th>
<th>Address</th>
<th>Plan</th>
<th>Status</th>
<th>Commission</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

let subscribers=[]

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="agent" && p=="1234"){

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

}else{
alert("Wrong login")
}

}

function add(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let code=document.getElementById("code").value
let address=document.getElementById("address").value
let plan=document.getElementById("plan").value
let status=document.getElementById("status").value

let commission=(plan/2)-50

subscribers.push({
name,phone,code,address,plan,status,commission
})

render()

}

function render(){

let table=document.getElementById("table")
table.innerHTML=""

let pending=0
let installed=0
let totalCommission=0

subscribers.forEach(s=>{

let color="applied"

if(s.status=="Verification") color="verify"
if(s.status=="For Installation") color="install"

if(s.status=="Installed"){
color="done"
installed++
totalCommission+=s.commission
}else{
pending++
}

table.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.code}</td>
<td>${s.address}</td>
<td>₱${s.plan}</td>
<td><span class="status ${color}">${s.status}</span></td>
<td>₱${s.commission}</td>
</tr>
`

})

document.getElementById("total").innerText=subscribers.length
document.getElementById("pending").innerText=pending
document.getElementById("installed").innerText=installed
document.getElementById("commission").innerText=totalCommission

}

</script>

</body>
</html>
