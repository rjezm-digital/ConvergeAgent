<!DOCTYPE html>
<html>
<head>

<title>FiberAgent CRM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#eef1f7;
}

.login{
width:320px;
margin:120px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.login input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ddd;
}

.sidebar{
width:230px;
background:#1f2a44;
position:fixed;
height:100%;
padding:20px;
color:white;
}

.sidebar button{
width:100%;
margin:8px 0;
background:#2f3d63;
border:none;
padding:8px;
color:white;
border-radius:6px;
cursor:pointer;
}

.main{
margin-left:250px;
padding:30px;
}

.section{
display:none;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
color:white;
border-radius:10px;
}

.c1{background:#6a11cb;}
.c2{background:#ff9800;}
.c3{background:#4caf50;}
.c4{background:#ff5e62;}
.c5{background:#00bcd4;}
.c6{background:#795548;}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.status{
padding:4px 8px;
border-radius:6px;
color:white;
font-size:12px;
}

.applied{background:#9e9e9e;}
.omd{background:#2196f3;}
.pending{background:#ff9800;}
.approved{background:#4caf50;}
.forinstallation{background:#9c27b0;}
.installed{background:#2e7d32;}

.smallbtn{
font-size:11px;
padding:4px 6px;
}

.delete{
background:red;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="login" id="login">

<h2>FiberAgent CRM</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="font-size:12px">

Agents:<br>
agent1 / 1234<br>
agent2 / 1234<br>
agent3 / 1234<br><br>

Admin:<br>
admin / admin123

</p>

</div>

<div id="dashboard" style="display:none">

<div class="sidebar">

<h2 id="panelTitle">FiberAgent</h2>

<button onclick="showSection('dash')">Monitoring</button>
<button onclick="showSection('subs')">Subscribers</button>

</div>

<div class="main">

<div id="dash" class="section">

<h2>Sales Monitoring</h2>

<div class="cards">

<div class="card c1">Applications<br><span id="total">0</span></div>
<div class="card c2">Pending<br><span id="pending">0</span></div>
<div class="card c3">Installed<br><span id="installed">0</span></div>
<div class="card c4">Total Earnings<br>₱<span id="commission">0</span></div>
<div class="card c5">Weekly Earnings<br>₱<span id="weekly">0</span></div>
<div class="card c6">Monthly Earnings<br>₱<span id="monthly">0</span></div>

</div>

</div>

<div id="subs" class="section">

<h2>Add Subscriber</h2>

<input id="name" placeholder="Subscriber Name">
<input id="phone" placeholder="Phone Number">
<input id="code" placeholder="Application Code">

<select id="plan">

<option value="1349">Super FiberX Play 1349</option>
<option value="1599">Super FiberX Max 1599</option>
<option value="2599">Super FiberX Ultra 2599</option>

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>

<option value="1700">FiberX 1500 + Vision</option>
<option value="2200">FiberX 2000 + Vision</option>

<option value="1699">TOD 1699</option>
<option value="1999">TOD 1999</option>

<option value="1500">FlexiBIZ 1500</option>
<option value="2000">FlexiBIZ 2000</option>

<option value="1449">MicroBIZ MAX 1449</option>

</select>

<button onclick="add()">Add Subscriber</button>

<br><br>

<table>

<thead>
<tr>
<th>Agent</th>
<th>Name</th>
<th>Plan</th>
<th>Status</th>
<th>←</th>
<th>→</th>
<th>✕</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

</div>

<script>

let users={
agent1:"1234",
agent2:"1234",
agent3:"1234",
admin:"admin123"
}

let currentUser=""
let isAdmin=false

let subscribers=JSON.parse(localStorage.getItem("subs")||"[]")

let stages=[
"Applied",
"OMD",
"Pending",
"Approved",
"For Installation",
"Installed"
]

function save(){

localStorage.setItem("subs",JSON.stringify(subscribers))

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u]===p){

currentUser=u
isAdmin=(u==="admin")

login.style.display="none"
dashboard.style.display="block"

document.getElementById("panelTitle").innerText=isAdmin?"Admin Panel":"Agent Panel"

showSection("dash")
render()

}

}

function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

function add(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let code=document.getElementById("code").value
let plan=document.getElementById("plan").value

subscribers.push({
agent:currentUser,
name,
phone,
code,
plan,
status:0,
date:new Date()
})

save()
render()

}

function nextStep(i){

if(subscribers[i].status<stages.length-1){
subscribers[i].status++
}

save()
render()

}

function backStep(i){

if(subscribers[i].status>0){
subscribers[i].status--
}

save()
render()

}

function deleteRow(i){

subscribers.splice(i,1)

save()
render()

}

function render(){

let table=document.getElementById("table")
table.innerHTML=""

let total=0
let pending=0
let installed=0
let weekly=0
let monthly=0

let now=new Date()

subscribers.forEach((s,i)=>{

if(!isAdmin && s.agent!==currentUser) return

let stage=stages[s.status]
let commission=(s.plan/2)-50

if(stage==="Installed"){

installed++
total+=commission

let diff=(now-new Date(s.date))/86400000

if(diff<=7) weekly+=commission
if(diff<=30) monthly+=commission

}else{
pending++
}

table.innerHTML+=`

<tr>

<td>${s.agent}</td>
<td>${s.name}</td>
<td>₱${s.plan}</td>
<td><span class="status ${stage.toLowerCase().replace(' ','')}">${stage}</span></td>

<td><button class="smallbtn" onclick="backStep(${i})">←</button></td>
<td><button class="smallbtn" onclick="nextStep(${i})">→</button></td>
<td><button class="delete smallbtn" onclick="deleteRow(${i})">✕</button></td>

</tr>

`

})

document.getElementById("total").innerText=subscribers.length
document.getElementById("pending").innerText=pending
document.getElementById("installed").innerText=installed
document.getElementById("commission").innerText=total
document.getElementById("weekly").innerText=weekly
document.getElementById("monthly").innerText=monthly

}

</script>

</body>
</html>
