<!DOCTYPE html>
<html>
<head>

<title>Fiber CRM</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
width:380px;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.logo{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#4e6cff;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#3b55e0;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
FiberAgent CRM
</div>

<div class="subtitle">
ISP Sales & Installation Management
</div>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="footer">
Authorized users only
</div>

</div>


<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

/* ADMIN */

if(user==="admin" && pass==="admin123"){

window.location="admin.html"
return

}

/* INSTALLER */

if(pass==="1234" && user==="teamA"){

localStorage.setItem("installerTeam","Team A")
window.location="installer.html"
return

}

if(pass==="1234" && user==="teamB"){

localStorage.setItem("installerTeam","Team B")
window.location="installer.html"
return

}

if(pass==="1234" && user==="teamC"){

localStorage.setItem("installerTeam","Team C")
window.location="installer.html"
return

}

/* AGENT */

if(pass==="1234"){

localStorage.setItem("agent",user)
window.location="agent.html"
return

}

alert("Invalid login")

}

</script>

</body>
</html>
