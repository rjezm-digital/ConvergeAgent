<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Converge Agent Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#0f172a;
color:#f1f5f9;
}

.font-display{
font-family:'Fraunces',serif;
}

.status-pill{
padding:4px 12px;
border-radius:999px;
font-size:12px;
font-weight:600;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>


<header class="flex items-center justify-between px-6 py-4 bg-slate-800 border-b border-slate-700">

<div class="flex items-center gap-4">

<img
src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Converge_ICT_logo.svg"
class="h-10">

<div>
<h1 class="font-display text-xl">Agent Dashboard</h1>
<p class="text-sm text-slate-400">Converge Sales Tracker</p>
</div>

</div>


<div class="flex gap-3">

<button id="btn-calendar"
class="px-4 py-2 bg-slate-700 rounded-lg text-sm">
Installation Calendar
</button>

<button id="btn-add"
class="px-4 py-2 bg-blue-500 rounded-lg text-sm flex gap-2 items-center">
<i data-lucide="plus"></i>
New Application
</button>

</div>

</header>



<main class="p-6">


<div id="stats"
class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>



<div class="flex gap-3 mb-4">

<input id="search"
placeholder="Search customer..."
class="flex-1 px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg">

<select id="filter"
class="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg">

<option value="all">All Status</option>
<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>

</div>



<div class="border border-slate-700 rounded-xl overflow-hidden">

<table class="w-full text-sm">

<thead class="bg-slate-800 text-slate-400">

<tr>

<th class="px-4 py-3 text-left">Customer</th>
<th class="px-4 py-3 text-left">Phone</th>
<th class="px-4 py-3 text-left">Address</th>
<th class="px-4 py-3 text-left">Plan</th>
<th class="px-4 py-3 text-left">Status</th>
<th class="px-4 py-3 text-left">Actions</th>

</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</main>



<div id="modal" class="modal hidden">

<div class="bg-slate-800 border border-slate-700 rounded-xl p-6 w-full max-w-lg">

<h2 class="font-display text-lg mb-4">New Application</h2>

<form id="form" class="space-y-3">

<input id="name" placeholder="Customer Name"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg">

<input id="phone" placeholder="Phone Number"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg">

<input id="address" placeholder="Address"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg">


<select id="plan"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg">

<option>Surf2Sawa 25 Mbps – ₱700</option>
<option>FiberX 1500 – 200 Mbps – ₱1500</option>
<option>FiberX 2000 – 400 Mbps – ₱2000</option>
<option>FiberX 2500 – 600 Mbps – ₱2500</option>
<option>FiberX 3500 – 800 Mbps – ₱3500</option>
<option>FiberX 7000 – 1 Gbps – ₱7000</option>
<option>FiberXtreme 3499 – Gaming</option>
<option>FiberXtreme 3999 – Gaming</option>
<option>FlexiBiz 3000 – SME</option>
<option>FlexiBiz 5000 – SME</option>
<option>FlexiBiz 7000 – SME</option>

</select>


<select id="status"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg">

<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>


<label class="text-xs text-slate-400">Installation Date</label>
<input type="date" id="install"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg">


<label class="text-xs text-slate-400">Follow Up Date</label>
<input type="date" id="follow"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg">


<div class="flex gap-3 pt-2">

<button class="flex-1 py-2 bg-blue-500 rounded-lg">
Save
</button>

<button type="button"
id="cancel"
class="flex-1 py-2 bg-slate-700 rounded-lg">
Cancel
</button>

</div>

</form>

</div>

</div>



<script>

const $ = id => document.getElementById(id)

let records = []

const COMMISSION = 1500



function renderStats(){

let installed = records.filter(r=>r.status==="Installed").length
let commission = installed * COMMISSION

$("stats").innerHTML = `

<div class="bg-slate-800 p-4 rounded-xl">
<p class="text-slate-400 text-xs">TOTAL APPLICATIONS</p>
<p class="text-2xl font-bold">${records.length}</p>
</div>

<div class="bg-slate-800 p-4 rounded-xl">
<p class="text-slate-400 text-xs">INSTALLED</p>
<p class="text-2xl font-bold">${installed}</p>
</div>

<div class="bg-slate-800 p-4 rounded-xl">
<p class="text-slate-400 text-xs">COMMISSION</p>
<p class="text-2xl font-bold text-green-400">₱${commission}</p>
</div>

`

}



function renderTable(){

let search = $("search").value.toLowerCase()
let status = $("filter").value

$("table").innerHTML=""

records
.filter(r=>{

let s = r.name.toLowerCase().includes(search)
let st = status==="all" || r.status===status

return s && st

})
.forEach((r,i)=>{

let tr=document.createElement("tr")

tr.className="border-t border-slate-700"

tr.innerHTML=`

<td class="px-4 py-3">${r.name}</td>
<td class="px-4 py-3">${r.phone}</td>
<td class="px-4 py-3">${r.address}</td>
<td class="px-4 py-3">${r.plan}</td>
<td class="px-4 py-3">${r.status}</td>

<td class="px-4 py-3 flex gap-2">

<button onclick="advance(${i})">
<i data-lucide="arrow-right"></i>
</button>

<button onclick="delRec(${i})">
<i data-lucide="trash"></i>
</button>

</td>

`

$("table").appendChild(tr)

})

lucide.createIcons()

}



function advance(i){

const order=[
"Application",
"OMD",
"Approved",
"Scheduled",
"Installed"
]

let idx=order.indexOf(records[i].status)

if(idx<order.length-1)
records[i].status=order[idx+1]

renderStats()
renderTable()

}



function delRec(i){

records.splice(i,1)

renderStats()
renderTable()

}



$("btn-add").onclick=()=>{
$("modal").classList.remove("hidden")
}



$("cancel").onclick=()=>{
$("modal").classList.add("hidden")
}



$("form").onsubmit=e=>{

e.preventDefault()

records.push({

name:$("name").value,
phone:$("phone").value,
address:$("address").value,
plan:$("plan").value,
status:$("status").value,
install:$("install").value,
follow:$("follow").value

})

$("modal").classList.add("hidden")

renderStats()
renderTable()

}



$("btn-calendar").onclick=()=>{

let installs=records.filter(r=>r.install)

let txt="Install Schedule\n\n"

installs.forEach(r=>{
txt+=`${r.install} - ${r.name}\n`
})

alert(txt)

}



function checkFollowups(){

let today=new Date().toISOString().split("T")[0]

let due=records.filter(r=>r.follow===today)

if(due.length)
alert(`${due.length} follow ups today`)

}

setTimeout(checkFollowups,2000)



$("search").oninput=renderTable
$("filter").onchange=renderTable



renderStats()
renderTable()

lucide.createIcons()

</script>

</body>
</html>
