<!DOCTYPE html>
<html>
<head>

<title>Agent Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

.sidebar{
width:250px;
background:linear-gradient(180deg,#6a5acd,#4a6cf7);
color:white;
padding:20px;
height:100vh;
}

.main{
flex:1;
background:#eef1f7;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

.form{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.sub{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}

#map{
height:300px;
margin-top:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Agent Panel</h2>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<div class="cards">

<div class="card">Total Commission <span id="total">0</span></div>
<div class="card">Weekly <span id="weekly">0</span></div>
<div class="card">Monthly <span id="monthly">0</span></div>

</div>

<div class="form">

<h3>Add Subscriber</h3>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<input id="code" placeholder="Application Code">

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<select id="plan">

<option value="1349">Super FiberX Play 1349</option>
<option value="1599">Super FiberX Max 1599</option>
<option value="2599">Super FiberX Ultra 2599</option>

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>

<option value="1699">TOD 1699</option>
<option value="1999">TOD 1999</option>

<option value="1500">FlexiBIZ 1500</option>
<option value="2000">FlexiBIZ 2000</option>

<option value="1449">MicroBIZ MAX 1449</option>
<option value="1549">MicroBIZ MAX 1549</option>

</select>

<button onclick="add()">Add Subscriber</button>

</div>

<h3>Click Map To Auto Fill Coordinates</h3>

<div id="map"></div>

<div id="list"></div>

</div>

<script>

let agent=localStorage.getItem("agent")

let subs=JSON.parse(localStorage.getItem("subs")||"[]")

let map=L.map('map').setView([9.7,124],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

map.on("click",e=>{

lat.value=e.latlng.lat
lng.value=e.latlng.lng

})

function save(){
localStorage.setItem("subs",JSON.stringify(subs))
}

function add(){

subs.push({
agent:agent,
name:name.value,
address:address.value,
phone:phone.value,
code:code.value,
lat:lat.value,
lng:lng.value,
plan:parseInt(plan.value),
status:0,
date:new Date()
})

save()
render()

}

function next(i){

if(subs[i].status<5) subs[i].status++

save()
render()

}

function render(){

list.innerHTML=""

subs.forEach((s,i)=>{

if(s.agent!==agent) return

list.innerHTML+=`

<div class="sub">

<b>${s.name}</b><br>

Plan: ${s.plan}<br>

Status: ${s.status}<br>

<button onclick="next(${i})">Next Status</button>

</div>

`

})

}

function logout(){
window.location="index.html"
}

render()

</script>

</body>
</html>
